syntax = "proto3";

package commerce.inventory.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/bahramdep/grpc-commerce/gen/go/commerce/inventory/v1;inventoryv1";

service InventoryService {
  rpc ReserveInventory(ReserveInventoryRequest) returns (ReserveInventoryResponse);
  rpc ReleaseInventory(ReleaseInventoryRequest) returns (ReleaseInventoryResponse);
}

message InventoryItem {
  string product_id = 1;
  int32 quantity = 2;
}

message ReserveInventoryRequest {
  string idempotency_key = 1;
  string order_id = 2;
  repeated InventoryItem items = 3;
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  RESERVATION_STATUS_RESERVED = 1;
  RESERVATION_STATUS_RELEASED = 2;
}

message Reservation {
  string id = 1;
  string order_id = 2;
  repeated InventoryItem items = 3;
  ReservationStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ReserveInventoryResponse {
  Reservation reservation = 1;
}

message ReleaseInventoryRequest {}

message ReleaseInventoryResponse {}
